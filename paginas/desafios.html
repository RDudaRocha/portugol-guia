<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio Portugol</title>

    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial;
            margin: 0;
            padding: 30px;
        }

        h1 {
            color: #38bdf8;
        }

        #editor {
            height: 420px;
            border-radius: 10px;
            margin-top: 20px;
        }

        button {
            background: #38bdf8;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-right: 10px;
        }

        button:hover {
            background: #0ea5e9;
        }

        .finalizar {
            background: #ef4444;
        }

        .terminal {
            background: #000;
            color: #00ff00;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            font-family: monospace;
            min-height: 150px;
            white-space: pre-line;
        }

        .terminal-input {
            margin-top: 10px;
        }

        .terminal-input input {
            background: #111;
            border: 1px solid #333;
            color: #00ff00;
            padding: 8px;
            width: 200px;
            font-family: monospace;
        }

        .correct {
            background: #16a34a;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
        }

        .wrong {
            background: #dc2626;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
        }

        #status {
            margin-top: 10px;
            font-weight: bold;
        }

        #tempo {
            margin-top: 5px;
        }

        body {
            background: #0f172a;
            color: white;
            font-family: Arial;
            margin: 0;
            padding: 30px;
        }

        h1 {
            color: #38bdf8;
        }

        /* EDITOR */
        #editor {
            height: 420px;
            border-radius: 10px;
            margin-top: 20px;
            width: 100%;
        }

        /* BOTÕES */
        button {
            background: #38bdf8;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-right: 10px;
            margin-top: 8px;
        }

        button:hover {
            background: #0ea5e9;
        }

        .finalizar {
            background: #ef4444;
        }

        /* CONTAINER BOTÕES */
        .botoes {
            display: flex;
            flex-wrap: wrap;
        }

        /* TERMINAL */
        .terminal {
            background: #000;
            color: #00ff00;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            font-family: monospace;
            min-height: 150px;
            white-space: pre-line;
            overflow-x: auto;
        }

        /* INPUT TERMINAL */
        .terminal-input {
            margin-top: 10px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .terminal-input input {
            background: #111;
            border: 1px solid #333;
            color: #00ff00;
            padding: 8px;
            font-family: monospace;
            flex: 1;
            min-width: 150px;
        }

        /* FEEDBACK */
        .correct {
            background: #16a34a;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
        }

        .wrong {
            background: #dc2626;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
        }

        #status {
            margin-top: 10px;
            font-weight: bold;
        }

        #tempo {
            margin-top: 5px;
        }

        /* RESPONSIVO */
        @media (max-width: 768px) {

            body {
                padding: 15px;
            }

            #editor {
                height: 300px;
            }

            button {
                flex: 1;
                min-width: 120px;
            }

        }
    </style>

    <script src="https://unpkg.com/monaco-editor@0.44.0/min/vs/loader.js"></script>

</head>

<body>

    <h1>Desafio Portugol</h1>

    <div id="status"></div>
    <div id="tempo">Tempo: 0s</div>

    <h2 id="pergunta"></h2>

    <div id="editor"></div>

    <br>

    <div class="botoes">
        <button onclick="executarCodigo()">Executar</button>
        <button id="btnEnviar" onclick="verificarResposta()">Enviar</button>
        <button onclick="mostrarDica()">Dica</button>
        <button onclick="limparTerminal()">Limpar Terminal</button>
        <button id="proximaBtn" onclick="proximaPergunta()" style="display:none;">Próxima</button>
        <button class="finalizar" onclick="finalizarProva()">Finalizar Prova</button>
    </div>

    <div id="feedback"></div>

    <h3>Terminal</h3>

    <div id="terminal" class="terminal"></div>

    <div class="terminal-input">
        <input id="terminalInput" placeholder="Digite aqui...">
        <button onclick="enviarEntrada()">Enviar</button>
    </div>

    <script>

        const codigoBase = `programa
{
    funcao inicio()
    {

    }
}`

        const perguntas = [
            { pergunta: "Mostre na tela: Olá Mundo", resposta: ["escreva", "olá mundo"], dica: "Use escreva(\"Olá Mundo\")" },
            { pergunta: "Use escreva para mostrar seu nome", resposta: ["escreva"], dica: "Use escreva(\"Seu Nome\")" },
            { pergunta: "Use SE para verificar se idade >=18", resposta: ["se", ">=18"], dica: "Use se(idade >= 18)" },
            { pergunta: "Crie um PARA de 1 até 10", resposta: ["para", "10"], dica: "Use para(i=1;i<=10;i++)" },
            { pergunta: "Crie vetor numeros[5]", resposta: ["vetor", "5"], dica: "vetor numeros[5]" },
            { pergunta: "Mostre números pares de 1 a 10", resposta: ["%2", "para"], dica: "Use %2 para pares" },
            { pergunta: "Mostre números ímpares", resposta: ["%2"], dica: "Use %2 != 0" },
            { pergunta: "Crie função soma(a,b)", resposta: ["funcao", "soma"], dica: "funcao soma(a,b)" },
            { pergunta: "Use leia()", resposta: ["leia"], dica: "leia(variavel)" },
            { pergunta: "Crie matriz 2x2", resposta: ["matriz", "2"], dica: "matriz[2][2]" },

            { pergunta: "Crie vetor nomes[3]", resposta: ["vetor", "nomes"], dica: "vetor nomes[3]" },
            { pergunta: "Use PARA para mostrar vetor", resposta: ["para"], dica: "Use um loop para" },
            { pergunta: "Crie função dobro(numero)", resposta: ["funcao", "dobro"], dica: "funcao dobro(numero)" },
            { pergunta: "Mostre tabuada do 7", resposta: ["7", "para"], dica: "Use para com 7" },
            { pergunta: "Some números de 1 a 20", resposta: ["para"], dica: "Use acumulador" },

            { pergunta: "Substitua terceiro elemento do vetor por 99", resposta: ["99"], dica: "vetor[2]=99" },
            { pergunta: "Crie função maior(a,b)", resposta: ["funcao", "se"], dica: "Use se dentro da função" },
            { pergunta: "Crie vetor 10 números", resposta: ["vetor", "10"], dica: "vetor numeros[10]" },
            { pergunta: "Crie matriz 3x3", resposta: ["matriz", "3"], dica: "matriz[3][3]" },
            { pergunta: "Leia número até ser 0", resposta: ["enquanto"], dica: "enquanto(numero!=0)" },

            { pergunta: "Crie função saudacao(nome)", resposta: ["funcao", "saudacao"], dica: "funcao saudacao(nome)" },
            { pergunta: "Use escreva para mostrar resultado", resposta: ["escreva"], dica: "escreva(resultado)" },
            { pergunta: "Use PARA para somar números", resposta: ["para"], dica: "Use acumulador" },
            { pergunta: "Crie função somaVetor", resposta: ["funcao"], dica: "funcao somaVetor" },
            { pergunta: "Mostre todos elementos do vetor", resposta: ["para"], dica: "Use para percorrer vetor" },

            { pergunta: "Crie vetor de 5 elementos", resposta: ["vetor", "5"], dica: "vetor numeros[5]" },
            { pergunta: "Mostre números de 1 a 5", resposta: ["para"], dica: "para(i=1;i<=5;i++)" },
            { pergunta: "Mostre mensagem Aprendendo Portugol", resposta: ["portugol"], dica: "escreva(\"Aprendendo Portugol\")" },
            { pergunta: "Use SE e SENAO", resposta: ["se", "senao"], dica: "Use estrutura condicional" },
            { pergunta: "Mostre Olá Nome", resposta: ["olá"], dica: "escreva(\"Olá\",nome)" }
        ]

        let perguntasSelecionadas = []
        let perguntaAtual = 0
        let acertos = 0
        let editor

        let tempo = 0
        setInterval(() => {
            tempo++
            document.getElementById("tempo").innerText = "Tempo: " + tempo + "s"
        }, 1000)

        function embaralhar(array) {
            return array.sort(() => Math.random() - 0.5)
        }

        function iniciarDesafio() {
            perguntasSelecionadas = embaralhar(perguntas).slice(0, 5)
            carregarPergunta()
        }

        function atualizarStatus() {
            document.getElementById("status").innerHTML =
                "Acertos: " + acertos + " | Pergunta " + (perguntaAtual + 1) + " de " + perguntasSelecionadas.length
        }

        function carregarPergunta() {

            if (perguntaAtual >= perguntasSelecionadas.length) {
                finalizarProva()
                return
            }

            atualizarStatus()

            document.getElementById("pergunta").innerText =
                "Pergunta " + (perguntaAtual + 1) + " de " + perguntasSelecionadas.length + ": " +
                perguntasSelecionadas[perguntaAtual].pergunta

            editor.setValue(codigoBase)

            document.getElementById("feedback").innerHTML = ""
            document.getElementById("proximaBtn").style.display = "none"
            document.getElementById("btnEnviar").disabled = false

        }

        function verificarResposta() {

            let codigo = editor.getValue().toLowerCase()
            codigo = codigo.replace(/\/\/.*$/gm, "")

            let correta = true
            let faltando = []

            if (!codigo.includes("programa") || !codigo.includes("funcao inicio")) {
                correta = false
                faltando.push("estrutura programa")
            }

            let requisitos = perguntasSelecionadas[perguntaAtual].resposta

            for (let r of requisitos) {
                if (!codigo.includes(r)) {
                    correta = false
                    faltando.push(r)
                }
            }

            const feedback = document.getElementById("feedback")

            if (correta) {

                acertos++

                feedback.innerHTML = "✅ Código aceito!"
                feedback.className = "correct"

                document.getElementById("btnEnviar").disabled = true
                document.getElementById("proximaBtn").style.display = "inline-block"

                atualizarStatus()

            } else {

                feedback.innerHTML = "❌ Faltou usar: " + faltando.join(", ")
                feedback.className = "wrong"

            }

        }

        function proximaPergunta() {
            perguntaAtual++
            carregarPergunta()
        }

        function mostrarDica() {
            alert(perguntasSelecionadas[perguntaAtual].dica)
        }

        function limparTerminal() {
            document.getElementById("terminal").innerHTML = ""
        }

        let esperandoEntrada = false
        let variavelLeitura = ""
        let variaveis = {}
        let linhasCodigo = []
        let linhaAtual = 0

        function executarCodigo() {

            let codigo = editor.getValue()
            let terminal = document.getElementById("terminal")

            terminal.innerHTML = ""
            variaveis = {}
            linhasCodigo = codigo.split("\n")
            linhaAtual = 0

            executarLinha()

        }

        function executarLinha() {

            let terminal = document.getElementById("terminal")

            while (linhaAtual < linhasCodigo.length) {

                let linha = linhasCodigo[linhaAtual].trim()

                // Ignorar linhas vazias
                if (linha === "" || linha === "{" || linha === "}") {
                    linhaAtual++
                    continue
                }

                // =====================
                // DECLARAÇÃO DE VARIÁVEL
                // =====================
                if (linha.startsWith("inteiro") || linha.startsWith("real") || linha.startsWith("cadeia")) {

                    let tipo = linha.split(" ")[0]
                    let nomes = linha.replace(tipo, "").replace(";", "").split(",")

                    nomes.forEach(n => {
                        variaveis[n.trim()] = 0
                    })

                    linhaAtual++
                    continue
                }

                // =====================
                // ATRIBUIÇÃO
                // =====================
                if (linha.includes("=") && !linha.startsWith("se") && !linha.startsWith("para")) {

                    let partes = linha.replace(";", "").split("=")

                    let variavel = partes[0].trim()
                    let expressao = partes[1]

                    for (let v in variaveis) {
                        expressao = expressao.replace(new RegExp("\\b" + v + "\\b", "g"), variaveis[v])
                    }

                    try {
                        variaveis[variavel] = eval(expressao)
                    } catch (e) { }

                    linhaAtual++
                    continue
                }

                // =====================
                // ESCREVA
                // =====================
                if (linha.startsWith("escreva")) {

                    let match = linha.match(/\((.*?)\)/)

                    if (match) {

                        let itens = match[1].split(",")

                        let resultado = ""

                        itens.forEach(i => {

                            i = i.trim().replace(/["']/g, "")

                            if (variaveis[i] !== undefined)
                                resultado += variaveis[i] + " "
                            else
                                resultado += i + " "

                        })

                        terminal.innerHTML += resultado + "\n"
                    }

                    linhaAtual++
                    continue
                }

                // =====================
                // LEIA
                // =====================
                if (linha.startsWith("leia")) {

                    let varMatch = linha.match(/\((.*?)\)/)

                    if (varMatch) {

                        variavelLeitura = varMatch[1]
                        esperandoEntrada = true
                        linhaAtual++

                        document.getElementById("terminalInput").focus()
                        return
                    }
                }

                // =====================
                // SE
                // =====================
                if (linha.startsWith("se")) {

                    let condicao = linha.match(/\((.*?)\)/)[1]

                    for (let v in variaveis) {
                        condicao = condicao.replace(new RegExp("\\b" + v + "\\b", "g"), variaveis[v])
                    }

                    let resultado = false

                    try {
                        resultado = eval(condicao)
                    } catch (e) { }

                    linhaAtual++

                    if (!resultado) {

                        while (linhaAtual < linhasCodigo.length) {

                            let l = linhasCodigo[linhaAtual].trim()

                            if (l.startsWith("senao")) {
                                linhaAtual++
                                break
                            }

                            if (l === "}") break

                            linhaAtual++
                        }
                    }

                    continue
                }

                // =====================
                // SENAO
                // =====================
                if (linha.startsWith("senao")) {

                    while (linhaAtual < linhasCodigo.length) {

                        let l = linhasCodigo[linhaAtual].trim()

                        if (l === "}") break

                        linhaAtual++
                    }

                    linhaAtual++
                    continue
                }

                // =====================
                // PARA
                // =====================
                // =====================
                // PARA
                // =====================
                if (linha.startsWith("para")) {

                    let match = linha.match(/\((.*?)\)/)

                    if (match) {

                        let partes = match[1].split(";")

                        let inicio = partes[0].split("=")
                        let variavel = inicio[0].trim()
                        let valorInicial = parseInt(inicio[1])

                        variaveis[variavel] = valorInicial

                        let condicao = partes[1]
                        let incremento = partes[2]

                        // pegar bloco do loop
                        let bloco = []
                        linhaAtual++

                        while (linhaAtual < linhasCodigo.length && !linhasCodigo[linhaAtual].includes("}")) {
                            bloco.push(linhasCodigo[linhaAtual].trim())
                            linhaAtual++
                        }

                        // executar loop
                        while (true) {

                            let cond = condicao

                            for (let v in variaveis) {
                                cond = cond.replace(new RegExp("\\b" + v + "\\b", "g"), variaveis[v])
                            }

                            if (!eval(cond)) break

                            bloco.forEach(l => {

                                if (l.startsWith("escreva")) {

                                    let match = l.match(/\((.*?)\)/)

                                    if (match) {

                                        let item = match[1].trim()

                                        if (variaveis[item] !== undefined)
                                            terminal.innerHTML += variaveis[item] + "\n"
                                        else
                                            terminal.innerHTML += item.replace(/["']/g, "") + "\n"

                                    }

                                }

                            })

                            // incremento
                            if (incremento.includes("++"))
                                variaveis[variavel]++
                            else if (incremento.includes("--"))
                                variaveis[variavel]--
                        }

                    }

                    linhaAtual++
                    continue
                }

                // =====================
                // ENQUANTO
                // =====================
                if (linha.startsWith("enquanto")) {

                    let condicao = linha.match(/\((.*?)\)/)[1]

                    let bloco = []
                    linhaAtual++

                    while (linhaAtual < linhasCodigo.length && !linhasCodigo[linhaAtual].includes("}")) {
                        bloco.push(linhasCodigo[linhaAtual])
                        linhaAtual++
                    }

                    while (true) {

                        let cond = condicao

                        for (let v in variaveis) {
                            cond = cond.replace(new RegExp("\\b" + v + "\\b", "g"), variaveis[v])
                        }

                        if (!eval(cond)) break

                        bloco.forEach(l => {
                            linhasCodigo.splice(linhaAtual + 1, 0, l)
                        })
                    }

                    linhaAtual++
                    continue
                }

                linhaAtual++
            }

        }

        function enviarEntrada() {

            if (!esperandoEntrada) return

            let input = document.getElementById("terminalInput")
            let valor = input.value

            let terminal = document.getElementById("terminal")

            terminal.innerHTML += "> " + valor + "\n"

            variaveis[variavelLeitura] = valor

            input.value = ""
            esperandoEntrada = false

            executarLinha()

        }

        function finalizarProva() {

            let confirmar = confirm("Deseja realmente finalizar a prova?")
            if (!confirmar) return

            let nota = Math.round((acertos / perguntasSelecionadas.length) * 10)

            window.location.href =
                "resultado.html?nota=" + nota +
                "&acertos=" + acertos +
                "&respondidas=" + perguntasSelecionadas.length +
                "&tempo=" + tempo

        }

        require.config({ paths: { 'vs': 'https://unpkg.com/monaco-editor@0.44.0/min/vs' } })

        require(['vs/editor/editor.main'], function () {

            editor = monaco.editor.create(document.getElementById('editor'), {

                value: codigoBase,
                language: 'javascript',
                theme: 'vs-dark',
                fontSize: 16,
                minimap: { enabled: false }

            })

            iniciarDesafio()

        })

        window.addEventListener("resize", () => {
            editor.layout()
        })
    </script>

</body>

</html>
