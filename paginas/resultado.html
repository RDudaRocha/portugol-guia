<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Resultado</title>

    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .box {
            background: #1e293b;
            padding: 40px;
            border-radius: 10px;
        }

        h1 {
            color: #38bdf8;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #38bdf8;
            font-weight: bold;
            cursor: pointer;
        }
    </style>

</head>

<body>
    
    <div class="box">

        <h1>Resultado do Desafio</h1>

        <h2 id="resultado"></h2>
        <button onclick="tentarnovamente()">Tentar Novamente</button>
        <button onclick="voltar()">Voltar ao Menu</button>

    </div>

    <script>

        const params = new URLSearchParams(window.location.search)

        const nota = params.get("nota")
        const acertos = params.get("acertos")
        const respondidas = params.get("respondidas")

        document.getElementById("resultado").innerHTML =

            `Nota: ${nota}/10<br><br>
Acertos: ${acertos}<br>
Respondidas: ${respondidas}`

        function voltar() {

            window.location.href = "../index.html"

        }

        function tentarnovamente() {

            window.location.href = "desafios.html"

        }

    </script>

</body>

</html>
